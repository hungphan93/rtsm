#  artifacts:
#    paths:
#      - build/

build_appimage:
  stage: build
  script:
    - echo "📦 Starting AppImage build..."
    - mkdir -p build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release
    - make -j$(nproc)
    - cd ..
    - chmod +x appimage_build.sh
    - bash appimage_build.sh
    - echo "📦 The End AppImage build..."
  rules:
    - if: '$CI_COMMIT_BRANCH == "v1.0.0"'
  artifacts:
    paths:
      - rtsm*.AppImage

release:
  stage: release
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  only:
    - tags
  artifacts:
    paths:
      - rtsm*.AppImage
  release:
    name: "RTSM $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: "Release for RTSM $CI_COMMIT_TAG"
