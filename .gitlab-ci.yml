image: ubuntu:22.04

stages:
  - build
#  - package
#  - release

variables:
  DEBIAN_FRONTEND: noninteractive

#before_script:
# - chmod x+ build_install_dependency.sh
# - ./build_install_dependency.sh
# - echo "Done build install dependency"
before_script:
  - echo "before install"
  - apt update && apt install -y build-essential qt6-base-dev qt6-declarative-dev qt6-tools-#dev-tools git wget curl libfuse2
#before_script:
#  - apt update && apt install -y build-essential qt6-base-dev qt6-declarative-dev qt6-tools-#dev-tools git wget curl libfuse2

build_release:
  stage: build
  script:
    - mkdir -p build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release
    - cmake --build . --parallel
  artifacts:
    paths:
      - build/

build_appimage:
  stage: package
  script:
    - chmod +x appimage_build.sh
    - ./appimage_build.sh
  needs: ["build_release"]
  artifacts:
    paths:
      - rtsm*.AppImage

release:
  stage: release
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  only:
    - tags
  artifacts:
    paths:
      - rtsm*.AppImage
  release:
    name: "RTSM $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: "Release for RTSM $CI_COMMIT_TAG"
