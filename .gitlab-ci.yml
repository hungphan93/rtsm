image: ubuntu:22.04
image: registry.gitlab.com/cppqt/qt6:6.6

stages:
  - build
  - package
  - release

variables:
  DEBIAN_FRONTEND: noninteractive

before_script:
  - apt update
  - apt install -y git wget curl build-essential cmake qt6-base-dev qt6-declarative-dev qt6-tools-dev libfuse2 libglib2.0-bin desktop-file-utils libgl1-mesa-dev

