image: ubuntu:22.04

stages:
  - build
#  - package
#  - release

variables:
  DEBIAN_FRONTEND: noninteractive

before_script:
  - apt update && apt install -y sudo
  - useradd -m -s /bin/bash hungphan || true
  - mkdir -p /home/hungphan/{Downloads,Qt,Documents}
  - chown -R hungphan:hungphan /home/hungphan
  - chmod +x build_install_dependency.sh
  - ./build_install_dependency.sh
  - echo "Done build install dependency"

build_release:
  stage: build
  script:
    - mkdir -p build && cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Release
    - cmake --build . --parallel
  artifacts:
    paths:
      - build/

